name: Pantheon Dev FE Deploy

on:
  workflow_run:
    workflows:
      - Pantheon FE-BFF Integration Gate
    types:
      - completed
    branches:
      - dev
  workflow_dispatch:
    inputs:
      candidate_sha:
        description: "Exact 40-character dev candidate SHA."
        required: false
        default: ""
        type: string
      gate_run_id:
        description: "Successful Pantheon FE-BFF Integration Gate push run for candidate_sha."
        required: false
        default: ""
        type: string
      emergency_override:
        description: "Allow an older gated candidate; integrity, auth, and rollback probes still run."
        required: false
        default: false
        type: boolean
      rollback_drill:
        description: "After verified switch, deliberately restore and re-probe the exact previous release. Manual runs only."
        required: false
        default: false
        type: boolean
      override_reason:
        description: "Audited incident/change reason required for an emergency override or rollback drill."
        required: false
        default: ""
        type: string

permissions:
  contents: read
  actions: read

concurrency:
  group: pantheon-dev-fe-deploy
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy exact gated candidate to Pantheon dev VM
    if: >-
      ${{
        github.event_name == 'workflow_dispatch' ||
        (
          github.event.workflow_run.conclusion == 'success' &&
          github.event.workflow_run.event == 'push' &&
          github.event.workflow_run.head_branch == 'dev'
        )
      }}
    runs-on:
      - self-hosted
      - Linux
      - X64
      - pantheon-dev-vm
      - execute-plans-deploy
    env:
      PANTHEON_DEV_FE_HOST: https://pantheon-lupin-dev-fe.35.201.239.38.sslip.io
      PANTHEON_BFF_BASE_URL: https://pantheon-lupin-dev-bff.35.201.239.38.sslip.io
      PANTHEON_OLD_BFF_URL: https://pantheon-lupin-dev-bff.34.81.75.241.sslip.io
      PANTHEON_HOSTED_PROBE_PATH: /management/persona-fleet
      PANTHEON_HOSTED_REQUIRED_BFF_PATHS: /bff/me

    steps:
      - name: Initialize run-attempt audit directory
        id: audit
        shell: bash
        run: |
          set -euo pipefail
          audit_root="${RUNNER_TEMP%/}/pantheon-dev-fe-deploy-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
          audit_dir="${audit_root}/controller"
          rm -rf "$audit_root"
          mkdir -p "$audit_dir"
          echo "PANTHEON_AUDIT_RUN_ROOT=$audit_root" >> "$GITHUB_ENV"
          echo "PANTHEON_AUDIT_OUT_DIR=$audit_dir" >> "$GITHUB_ENV"
          echo "path=$audit_root" >> "$GITHUB_OUTPUT"

      - name: Validate exact gate run and immutable artifact
        id: gate
        uses: actions/github-script@v7
        env:
          REQUESTED_GATE_RUN_ID: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.id || inputs.gate_run_id }}
          REQUESTED_CANDIDATE_SHA: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || inputs.candidate_sha }}
          EMERGENCY_OVERRIDE: ${{ github.event_name == 'workflow_dispatch' && inputs.emergency_override || false }}
          ROLLBACK_DRILL: ${{ github.event_name == 'workflow_dispatch' && inputs.rollback_drill || false }}
          OVERRIDE_REASON: ${{ github.event_name == 'workflow_dispatch' && inputs.override_reason || '' }}
          AUTHORIZED_OPERATORS: ${{ vars.PANTHEON_DEV_FE_DEPLOY_OPERATORS }}
        with:
          script: |
            const shaPattern = /^[0-9a-f]{40}$/i;
            const runPattern = /^[1-9][0-9]*$/;
            const digestPattern = /^sha256:[0-9a-f]{64}$/i;
            const gateRunIdText = String(process.env.REQUESTED_GATE_RUN_ID || "").trim();
            const requestedSha = String(process.env.REQUESTED_CANDIDATE_SHA || "").trim().toLowerCase();
            const emergencyOverride = String(process.env.EMERGENCY_OVERRIDE || "false") === "true";
            const rollbackDrill = String(process.env.ROLLBACK_DRILL || "false") === "true";
            const overrideReason = String(process.env.OVERRIDE_REASON || "").trim();
            const authorizedOperators = new Set(
              String(process.env.AUTHORIZED_OPERATORS || "")
                .split(",")
                .map((value) => value.trim().toLowerCase())
                .filter(Boolean),
            );

            if (!runPattern.test(gateRunIdText)) {
              core.setFailed("gate_run_id must identify one exact successful integration-gate run");
              return;
            }
            if (!shaPattern.test(requestedSha)) {
              core.setFailed("candidate_sha must be one exact 40-character commit SHA");
              return;
            }
            if ((emergencyOverride || rollbackDrill) && overrideReason.length < 20) {
              core.setFailed("emergency_override and rollback_drill require an audited reason of at least 20 characters");
              return;
            }
            if (!emergencyOverride && !rollbackDrill && overrideReason) {
              core.setFailed("override_reason is only valid with emergency_override=true or rollback_drill=true");
              return;
            }
            if (
              (emergencyOverride || rollbackDrill) &&
              !authorizedOperators.has(String(context.actor || "").toLowerCase())
            ) {
              core.setFailed("emergency_override and rollback_drill require an authorized deploy operator");
              return;
            }

            const gateRunId = Number(gateRunIdText);
            const { data: run } = await github.rest.actions.getWorkflowRun({
              owner: context.repo.owner,
              repo: context.repo.repo,
              run_id: gateRunId,
            });
            const runPath = String(run.path || "").split("@")[0];
            const runRepo = run.head_repository?.full_name || run.repository?.full_name || "";
            const validRun =
              runPath === ".github/workflows/pantheon-integration-gate.yml" &&
              runRepo.toLowerCase() === `${context.repo.owner}/${context.repo.repo}`.toLowerCase() &&
              run.event === "push" &&
              run.head_branch === "dev" &&
              run.status === "completed" &&
              run.conclusion === "success" &&
              String(run.head_sha || "").toLowerCase() === requestedSha;
            if (!validRun) {
              core.setFailed(`run ${gateRunId} is not the successful dev push integration gate for ${requestedSha}`);
              return;
            }

            if (!Number.isSafeInteger(run.run_attempt) || run.run_attempt <= 0) {
              core.setFailed(`run ${gateRunId} returned an invalid run attempt`);
              return;
            }
            const artifactName = `pantheon-fe-release-candidate-attempt-${run.run_attempt}`;
            const { data: artifactPage } = await github.rest.actions.listWorkflowRunArtifacts({
              owner: context.repo.owner,
              repo: context.repo.repo,
              run_id: gateRunId,
              name: artifactName,
              per_page: 100,
            });
            const artifacts = artifactPage.artifacts.filter(
              (artifact) => artifact.name === artifactName && !artifact.expired,
            );
            if (artifacts.length !== 1 || !digestPattern.test(String(artifacts[0]?.digest || ""))) {
              core.setFailed(`run ${gateRunId} must expose one unexpired immutable candidate artifact with a SHA-256 digest`);
              return;
            }
            if (!Number.isSafeInteger(artifacts[0].id) || artifacts[0].id <= 0) {
              core.setFailed(`run ${gateRunId} returned an invalid candidate artifact id`);
              return;
            }

            const { data: devRef } = await github.rest.git.getRef({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: "heads/dev",
            });
            const currentDevSha = String(devRef.object.sha || "").toLowerCase();
            if (!shaPattern.test(currentDevSha)) {
              core.setFailed("current dev ref did not resolve to one exact commit SHA");
              return;
            }
            const outOfOrder = currentDevSha !== requestedSha;
            if (outOfOrder && !emergencyOverride) {
              core.setFailed(`out-of-order candidate rejected: current dev is ${currentDevSha}, candidate is ${requestedSha}`);
              return;
            }

            core.setOutput("candidate_sha", requestedSha);
            core.setOutput("gate_run_id", gateRunIdText);
            core.setOutput("artifact_id", String(artifacts[0].id));
            core.setOutput("artifact_name", artifactName);
            core.setOutput("github_artifact_digest", String(artifacts[0].digest).toLowerCase());
            core.setOutput("current_dev_sha", currentDevSha);
            core.setOutput("emergency_override", emergencyOverride ? "true" : "false");
            core.setOutput("rollback_drill", rollbackDrill ? "true" : "false");
            core.setOutput("override_reason", overrideReason);
            core.setOutput("override_actor", emergencyOverride || rollbackDrill ? context.actor : "");

      - name: Checkout trusted controller from exact current dev
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.gate.outputs.current_dev_sha }}
          fetch-depth: 0

      - name: Recheck trusted controller identity at runner
        id: controller
        shell: bash
        env:
          TRUSTED_CONTROLLER_SHA: ${{ steps.gate.outputs.current_dev_sha }}
        run: |
          set -euo pipefail
          checkout_sha="$(git rev-parse HEAD)"
          if [[ "$checkout_sha" != "$TRUSTED_CONTROLLER_SHA" ]]; then
            echo "Trusted controller checkout mismatch: expected $TRUSTED_CONTROLLER_SHA, got $checkout_sha" >&2
            exit 1
          fi
          current_dev_sha="$(git ls-remote --exit-code origin refs/heads/dev | awk '{print $1}')"
          if [[ "$current_dev_sha" != "$TRUSTED_CONTROLLER_SHA" ]]; then
            echo "Trusted controller is stale: expected dev=$TRUSTED_CONTROLLER_SHA current dev=$current_dev_sha" >&2
            exit 1
          fi

      - name: Download, authenticate, and safely extract exact artifact
        id: artifact_transport
        shell: bash
        env:
          ARTIFACT_ID: ${{ steps.gate.outputs.artifact_id }}
          ARTIFACT_NAME: ${{ steps.gate.outputs.artifact_name }}
          EXPECTED_ARCHIVE_DIGEST: ${{ steps.gate.outputs.github_artifact_digest }}
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          archive="${RUNNER_TEMP%/}/pantheon-fe-release-candidate-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}.zip"
          extract_dir="${RUNNER_TEMP%/}/pantheon-fe-release-candidate-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}.extract"
          rm -f "$archive"
          rm -rf "$extract_dir" .release-candidate
          mkdir -p "$extract_dir"

          curl --fail-with-body --silent --show-error --location \
            --retry 3 --retry-all-errors --connect-timeout 10 --max-time 180 \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "${GITHUB_API_URL}/repos/${GITHUB_REPOSITORY}/actions/artifacts/${ARTIFACT_ID}/zip" \
            --output "$archive"

          actual_archive_digest="sha256:$(sha256sum "$archive" | awk '{print $1}')"
          expected_archive_digest="$(printf '%s' "$EXPECTED_ARCHIVE_DIGEST" | tr '[:upper:]' '[:lower:]')"
          if [[ "$actual_archive_digest" != "$expected_archive_digest" ]]; then
            echo "Artifact archive digest mismatch: API=$expected_archive_digest downloaded=$actual_archive_digest" >&2
            exit 1
          fi

          python3 - "$archive" "$extract_dir" <<'PY'
          import pathlib
          import shutil
          import stat
          import sys
          import zipfile

          archive = pathlib.Path(sys.argv[1])
          root = pathlib.Path(sys.argv[2]).resolve()
          seen = set()
          total_size = 0

          with zipfile.ZipFile(archive) as bundle:
              entries = bundle.infolist()
              if not entries or len(entries) > 100_000:
                  raise SystemExit("artifact archive has an invalid entry count")
              for entry in entries:
                  name = entry.filename
                  if not name or "\\" in name or "\x00" in name:
                      raise SystemExit("artifact archive contains an unsafe path")
                  path = pathlib.PurePosixPath(name)
                  if path.is_absolute() or any(part in ("", ".", "..") for part in path.parts):
                      raise SystemExit(f"artifact archive contains an unsafe path: {name!r}")
                  normalized = path.as_posix().rstrip("/")
                  if normalized in seen:
                      raise SystemExit(f"artifact archive contains a duplicate path: {name!r}")
                  seen.add(normalized)

                  mode = entry.external_attr >> 16
                  kind = stat.S_IFMT(mode)
                  is_directory = entry.is_dir() or name.endswith("/")
                  allowed_kind = stat.S_IFDIR if is_directory else stat.S_IFREG
                  if kind not in (0, allowed_kind):
                      raise SystemExit(f"artifact archive contains a non-regular entry: {name!r}")

                  total_size += entry.file_size
                  if total_size > 1_073_741_824:
                      raise SystemExit("artifact archive expands beyond the 1 GiB safety limit")

                  destination = root.joinpath(*path.parts)
                  if is_directory:
                      destination.mkdir(parents=True, exist_ok=True)
                      continue
                  destination.parent.mkdir(parents=True, exist_ok=True)
                  with bundle.open(entry) as source, destination.open("xb") as target:
                      shutil.copyfileobj(source, target, length=1024 * 1024)
          PY

          if [[ -f "$extract_dir/candidate.json" && -d "$extract_dir/dist" ]]; then
            mv "$extract_dir" .release-candidate
          elif [[ -f "$extract_dir/.release-candidate/candidate.json" && -d "$extract_dir/.release-candidate/dist" ]]; then
            mv "$extract_dir/.release-candidate" .release-candidate
            rm -rf "$extract_dir"
          else
            echo "Authenticated artifact does not contain one release-candidate root." >&2
            exit 1
          fi

          python3 - "$PANTHEON_AUDIT_OUT_DIR/artifact-transport.json" \
            "$ARTIFACT_ID" "$ARTIFACT_NAME" "$expected_archive_digest" "$actual_archive_digest" <<'PY'
          import json
          import pathlib
          import sys

          output = pathlib.Path(sys.argv[1])
          output.write_text(json.dumps({
              "artifactId": sys.argv[2],
              "artifactName": sys.argv[3],
              "apiDigest": sys.argv[4],
              "downloadedArchiveDigest": sys.argv[5],
              "status": "passed",
          }, sort_keys=True, indent=2) + "\n")
          PY

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Run target-runner controller regression harness
        id: controller_regression
        shell: bash
        run: |
          set -euo pipefail
          bash scripts/test-deploy-dev-vm.sh 2>&1 | tee "$PANTHEON_AUDIT_OUT_DIR/target-runner-controller-regression.log"

      - name: Deploy verified candidate
        id: deploy
        env:
          PANTHEON_DEPLOY_CANDIDATE_SHA: ${{ steps.gate.outputs.candidate_sha }}
          PANTHEON_DEPLOY_BRANCH: dev
          PANTHEON_DEPLOY_CANDIDATE_DIR: .release-candidate
          PANTHEON_DEPLOY_GATE_RUN_ID: ${{ steps.gate.outputs.gate_run_id }}
          PANTHEON_DEPLOY_GITHUB_ARTIFACT_DIGEST: ${{ steps.gate.outputs.github_artifact_digest }}
          PANTHEON_DEPLOY_EXPECTED_DEV_SHA: ${{ steps.gate.outputs.current_dev_sha }}
          PANTHEON_DEPLOY_EMERGENCY_OVERRIDE: ${{ steps.gate.outputs.emergency_override }}
          PANTHEON_DEPLOY_ROLLBACK_DRILL: ${{ steps.gate.outputs.rollback_drill }}
          PANTHEON_DEPLOY_OVERRIDE_REASON: ${{ steps.gate.outputs.override_reason }}
          PANTHEON_DEPLOY_OVERRIDE_ACTOR: ${{ steps.gate.outputs.override_actor }}
        run: bash scripts/deploy-dev-vm.sh

      - name: Write redacted workflow envelope
        if: always()
        shell: bash
        env:
          CANDIDATE_SHA: ${{ steps.gate.outputs.candidate_sha || (github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || inputs.candidate_sha) }}
          GATE_RUN_ID: ${{ steps.gate.outputs.gate_run_id || (github.event_name == 'workflow_run' && github.event.workflow_run.id || inputs.gate_run_id) }}
          ARTIFACT_ID: ${{ steps.gate.outputs.artifact_id }}
          ARTIFACT_NAME: ${{ steps.gate.outputs.artifact_name }}
          GITHUB_ARTIFACT_DIGEST: ${{ steps.gate.outputs.github_artifact_digest }}
          TRUSTED_CONTROLLER_SHA: ${{ steps.gate.outputs.current_dev_sha }}
          EMERGENCY_OVERRIDE: ${{ github.event_name == 'workflow_dispatch' && inputs.emergency_override || false }}
          ROLLBACK_DRILL: ${{ github.event_name == 'workflow_dispatch' && inputs.rollback_drill || false }}
          OVERRIDE_ACTOR: ${{ github.event_name == 'workflow_dispatch' && (inputs.emergency_override || inputs.rollback_drill) && github.actor || '' }}
          OVERRIDE_REASON: ${{ github.event_name == 'workflow_dispatch' && inputs.override_reason || '' }}
          GATE_OUTCOME: ${{ steps.gate.outcome }}
          CONTROLLER_OUTCOME: ${{ steps.controller.outcome }}
          ARTIFACT_TRANSPORT_OUTCOME: ${{ steps.artifact_transport.outcome }}
          CONTROLLER_REGRESSION_OUTCOME: ${{ steps.controller_regression.outcome }}
          DEPLOY_OUTCOME: ${{ steps.deploy.outcome }}
        run: |
          set -euo pipefail
          expected_audit_root="${RUNNER_TEMP%/}/pantheon-dev-fe-deploy-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
          if [[ "${PANTHEON_AUDIT_RUN_ROOT:-}" != "$expected_audit_root" || "${PANTHEON_AUDIT_OUT_DIR:-}" != "${expected_audit_root}/controller" ]]; then
            echo "Audit directory identity is missing or unsafe." >&2
            exit 1
          fi
          python3 - "$PANTHEON_AUDIT_RUN_ROOT/workflow-envelope.json" "$PANTHEON_AUDIT_RUN_ROOT/audit-seal.json" <<'PY'
          import hashlib
          import json
          import os
          import pathlib
          import sys

          reason = os.environ.get("OVERRIDE_REASON", "")
          envelope = {
              "schemaVersion": 1,
              "repository": os.environ.get("GITHUB_REPOSITORY", ""),
              "workflow": os.environ.get("GITHUB_WORKFLOW", ""),
              "runId": os.environ.get("GITHUB_RUN_ID", ""),
              "runAttempt": os.environ.get("GITHUB_RUN_ATTEMPT", ""),
              "eventName": os.environ.get("GITHUB_EVENT_NAME", ""),
              "candidateSha": os.environ.get("CANDIDATE_SHA", ""),
              "gateRunId": os.environ.get("GATE_RUN_ID", ""),
              "artifactId": os.environ.get("ARTIFACT_ID", ""),
              "artifactName": os.environ.get("ARTIFACT_NAME", ""),
              "githubArtifactDigest": os.environ.get("GITHUB_ARTIFACT_DIGEST", ""),
              "trustedControllerSha": os.environ.get("TRUSTED_CONTROLLER_SHA", ""),
              "emergencyOverride": os.environ.get("EMERGENCY_OVERRIDE", "") == "true",
              "rollbackDrill": os.environ.get("ROLLBACK_DRILL", "") == "true",
              "overrideActor": os.environ.get("OVERRIDE_ACTOR", ""),
              "overrideReasonSha256": hashlib.sha256(reason.encode()).hexdigest() if reason else "",
              "outcomes": {
                  "gate": os.environ.get("GATE_OUTCOME", ""),
                  "controller": os.environ.get("CONTROLLER_OUTCOME", ""),
                  "artifactTransport": os.environ.get("ARTIFACT_TRANSPORT_OUTCOME", ""),
                  "controllerRegression": os.environ.get("CONTROLLER_REGRESSION_OUTCOME", ""),
                  "deploy": os.environ.get("DEPLOY_OUTCOME", ""),
              },
          }
          output = pathlib.Path(sys.argv[1])
          output.parent.mkdir(parents=True, exist_ok=True)
          output.write_text(json.dumps(envelope, sort_keys=True, indent=2) + "\n")

          root = output.parent.resolve()
          seal_path = pathlib.Path(sys.argv[2]).resolve()
          if seal_path.parent != root:
              raise SystemExit("audit seal escaped the run root")
          files = []
          for candidate in sorted(root.rglob("*")):
              stat = candidate.lstat()
              if candidate == seal_path:
                  continue
              if candidate.is_symlink():
                  raise SystemExit("audit root must not contain symlinks")
              if candidate.is_dir():
                  if candidate.resolve() != candidate:
                      raise SystemExit("audit directory escaped its root")
                  continue
              if not candidate.is_file() or candidate.resolve() != candidate:
                  raise SystemExit("audit root must contain only regular files")
              data = candidate.read_bytes()
              files.append({
                  "path": candidate.relative_to(root).as_posix(),
                  "sizeBytes": len(data),
                  "sha256": hashlib.sha256(data).hexdigest(),
              })
          seal_path.write_text(json.dumps({
              "schemaVersion": "pantheon.dev-fe.workflow-audit-seal.v1",
              "repository": os.environ.get("GITHUB_REPOSITORY", ""),
              "runId": os.environ.get("GITHUB_RUN_ID", ""),
              "runAttempt": os.environ.get("GITHUB_RUN_ATTEMPT", ""),
              "files": files,
          }, sort_keys=True, indent=2) + "\n")
          PY

      - name: Verify complete workflow audit seal
        id: seal_verify
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          python3 - "$PANTHEON_AUDIT_RUN_ROOT" <<'PY'
          import hashlib
          import json
          import os
          import pathlib
          import sys

          root = pathlib.Path(sys.argv[1]).resolve()
          seal_path = root / "audit-seal.json"
          seal = json.loads(seal_path.read_text())
          if sorted(seal) != ["files", "repository", "runAttempt", "runId", "schemaVersion"]:
              raise SystemExit("audit seal has unexpected fields")
          if seal["schemaVersion"] != "pantheon.dev-fe.workflow-audit-seal.v1":
              raise SystemExit("audit seal schema mismatch")
          expected_identity = {
              "repository": os.environ.get("GITHUB_REPOSITORY", ""),
              "runId": os.environ.get("GITHUB_RUN_ID", ""),
              "runAttempt": os.environ.get("GITHUB_RUN_ATTEMPT", ""),
          }
          if any(seal[key] != value for key, value in expected_identity.items()):
              raise SystemExit("audit seal run identity mismatch")
          files = []
          for candidate in sorted(root.rglob("*")):
              stat = candidate.lstat()
              if candidate == seal_path:
                  continue
              if candidate.is_symlink():
                  raise SystemExit("audit root must not contain symlinks")
              if candidate.is_dir():
                  if candidate.resolve() != candidate:
                      raise SystemExit("audit directory escaped its root")
                  continue
              if not candidate.is_file() or candidate.resolve() != candidate:
                  raise SystemExit("audit root must contain only regular files")
              data = candidate.read_bytes()
              files.append({
                  "path": candidate.relative_to(root).as_posix(),
                  "sizeBytes": len(data),
                  "sha256": hashlib.sha256(data).hexdigest(),
              })
          if files != seal["files"]:
              raise SystemExit("workflow audit checksum mismatch")
          PY

      - name: Persist sealed deploy evidence on the dev VM
        id: durable_evidence
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          if [[ ! "$GITHUB_RUN_ID" =~ ^[1-9][0-9]*$ || ! "$GITHUB_RUN_ATTEMPT" =~ ^[1-9][0-9]*$ ]]; then
            echo "Invalid run identity for durable evidence path." >&2
            exit 1
          fi
          durable_root="/var/lib/pantheon-dev-fe-deploy-evidence"
          durable_dir="${durable_root}/run-${GITHUB_RUN_ID}-attempt-${GITHUB_RUN_ATTEMPT}"
          sudo install -d -o root -g root -m 750 "$durable_root" "$durable_dir"
          sudo rsync -a --delete --chown=root:root --chmod=Du=rwx,Dgo=rx,Fu=rw,Fgo=r \
            "$PANTHEON_AUDIT_RUN_ROOT/" "$durable_dir/"
          echo "Durable evidence: $durable_dir" >> "$GITHUB_STEP_SUMMARY"

      - name: Upload deploy evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pantheon-dev-fe-deploy-evidence-attempt-${{ github.run_attempt }}
          if-no-files-found: error
          include-hidden-files: true
          path: ${{ steps.audit.outputs.path }}

      - name: Summarize deployment
        if: always()
        env:
          CANDIDATE_SHA: ${{ steps.gate.outputs.candidate_sha }}
          GATE_RUN_ID: ${{ steps.gate.outputs.gate_run_id }}
          ARTIFACT_ID: ${{ steps.gate.outputs.artifact_id }}
          GITHUB_ARTIFACT_DIGEST: ${{ steps.gate.outputs.github_artifact_digest }}
          TRUSTED_CONTROLLER_SHA: ${{ steps.gate.outputs.current_dev_sha }}
          EMERGENCY_OVERRIDE: ${{ steps.gate.outputs.emergency_override }}
          ROLLBACK_DRILL: ${{ steps.gate.outputs.rollback_drill }}
        run: |
          {
            echo "## Pantheon Dev FE Deploy"
            echo "- candidate SHA: \`${CANDIDATE_SHA}\`"
            echo "- integration gate run: \`${GATE_RUN_ID}\`"
            echo "- immutable artifact id: \`${ARTIFACT_ID}\`"
            echo "- GitHub artifact digest: \`${GITHUB_ARTIFACT_DIGEST}\`"
