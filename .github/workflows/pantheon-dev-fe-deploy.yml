name: Pantheon Dev FE Deploy

on:
  # Auto-deploy on every merge/push to dev. Decoupled from the FE-BFF
  # integration gate (which keeps running as an informational PR/push check):
  # "merge to dev" now == "deploy to dev FE", no manual workflow_dispatch needed.
  # dev-only target; staging/prod still go through their own promotion path.
  push:
    branches:
      - dev
  workflow_dispatch:
    inputs:
      ref:
        description: "Commit SHA, branch, or tag to deploy. Defaults to dev."
        required: false
        default: "dev"
        type: string
      bff_commit:
        description: "Exact Pantheon BFF merge SHA paired with this frontend deployment. Required for manual final proof."
        required: false
        default: ""
        type: string
      deployment_profile:
        description: "Keep read-only unless opening the bounded Persona interaction proof window. Restore read-only immediately after the pinned integration proof."
        required: true
        default: "read-only"
        type: choice
        options:
          - "read-only"
          - "persona-interaction-write-proof"
          - "persona-interaction-read-only-restore"
      proof_window_ack:
        description: "I acknowledge the Persona proof profile enables dev writes temporarily and must be followed immediately by an exact-SHA read-only restore."
        required: true
        default: false
        type: boolean
      skip_probe:
        description: "Emergency only: deploy without the browser/BFF probe."
        required: false
        default: false
        type: boolean

permissions:
  contents: read
  # The guarded write-proof profile dispatches the exact hosted integration
  # workflow and waits for it before restoring the same FE/BFF pair read-only.
  actions: write

concurrency:
  group: pantheon-dev-fe-deploy
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy execute-plans to Pantheon dev VM
    timeout-minutes: 190
    if: >-
      ${{
        github.event_name == 'workflow_dispatch' ||
        github.event_name == 'push'
      }}
    runs-on:
      - self-hosted
      - Linux
      - X64
      - pantheon-dev-vm
      - execute-plans-deploy
    env:
      TARGET_REF: ${{ github.event_name == 'workflow_dispatch' && inputs.ref || github.sha }}
      TARGET_BRANCH: ${{ github.event_name == 'workflow_dispatch' && inputs.ref || github.ref_name }}
      PANTHEON_DEV_FE_HOST: https://pantheon-lupin-dev-fe.35.201.239.38.sslip.io
      PANTHEON_BFF_BASE_URL: https://pantheon-lupin-dev-bff.35.201.239.38.sslip.io
      PANTHEON_OLD_BFF_URL: https://pantheon-lupin-dev-bff.34.81.75.241.sslip.io
      PANTHEON_AUDIT_OUT_DIR: .lovable/audits/current-run
      PANTHEON_HOSTED_PROBE_PATH: /management/persona-fleet
      PANTHEON_HOSTED_REQUIRED_BFF_PATHS: /bff/me
      # Manual final-proof runs must name the exact expected runtime SHA.
      # Push deploys leave this empty and resolve /bff/version directly.
      # Never inherit the mutable repo variable as deployment evidence.
      PANTHEON_DEPLOY_EXPECTED_BFF_COMMIT: ${{ github.event_name == 'workflow_dispatch' && inputs.bff_commit || '' }}
      # Push/autodeploy is always read-only. The write-proof profile is exposed
      # only by manual dispatch and is further guarded by the deploy script.
      PANTHEON_DEPLOY_PROFILE: ${{ github.event_name == 'workflow_dispatch' && inputs.deployment_profile || 'read-only' }}
      PANTHEON_DEPLOY_PROOF_WINDOW_ACK: ${{ github.event_name == 'workflow_dispatch' && inputs.proof_window_ack || false }}
      PANTHEON_DEPLOY_SKIP_PROBE: ${{ github.event_name == 'workflow_dispatch' && inputs.skip_probe || false }}

    steps:
      - name: Checkout target ref
        uses: actions/checkout@v4
        with:
          ref: ${{ env.TARGET_REF || 'dev' }}
          fetch-depth: 0

      - name: Resolve deployment SHA
        id: sha
        run: echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Prepare audit directory
        run: |
          rm -rf "$PANTHEON_AUDIT_OUT_DIR"
          mkdir -p "$PANTHEON_AUDIT_OUT_DIR"

      - name: Deploy static build
        id: deploy
        timeout-minutes: 18
        env:
          PANTHEON_DEPLOY_REF: ${{ env.TARGET_REF || steps.sha.outputs.sha }}
          PANTHEON_DEPLOY_BRANCH: ${{ env.TARGET_BRANCH || 'dev' }}
          GITHUB_SHA: ${{ steps.sha.outputs.sha }}
          VITE_SUPABASE_URL: ${{ vars.VITE_SUPABASE_URL }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ vars.VITE_SUPABASE_PUBLISHABLE_KEY }}
        run: bash scripts/deploy-dev-vm.sh

      - name: Dispatch exact hosted Persona integration
        id: proof_gate
        if: steps.deploy.outcome == 'success' && env.PANTHEON_DEPLOY_PROFILE == 'persona-interaction-write-proof'
        timeout-minutes: 145
        env:
          GH_TOKEN: ${{ github.token }}
          EXACT_FE_SHA: ${{ steps.sha.outputs.sha }}
          EXACT_BFF_SHA: ${{ steps.deploy.outputs.bff_commit }}
          WORKFLOW_REF: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          dispatch_started="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          proof_correlation_id="deploy-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
          expected_title="PINT proof ${proof_correlation_id}"
          gh workflow run pantheon-integration-gate.yml \
            --repo "$GITHUB_REPOSITORY" \
            --ref "$WORKFLOW_REF" \
            -f fe_base_url="$PANTHEON_DEV_FE_HOST" \
            -f fe_sha="$EXACT_FE_SHA" \
            -f proof_correlation_id="$proof_correlation_id" \
            -f bff_base_url="$PANTHEON_BFF_BASE_URL" \
            -f bff_sha="$EXACT_BFF_SHA" \
            -f pantheon_contract_ref="$EXACT_BFF_SHA" \
            -f persona_interaction_write_proof=true \
            -f pint_hosted_probe=true \
            -f soft_fail=false

          gate_run_id=""
          for _ in $(seq 1 30); do
            gate_run_id="$(gh run list \
              --repo "$GITHUB_REPOSITORY" \
              --workflow pantheon-integration-gate.yml \
              --event workflow_dispatch \
              --branch "$WORKFLOW_REF" \
              --limit 20 \
              --json databaseId,createdAt,displayTitle \
              --jq 'map(select(.createdAt >= "'"$dispatch_started"'" and .displayTitle == "'"$expected_title"'")) | .[0].databaseId // empty')"
            [[ -n "$gate_run_id" ]] && break
            sleep 2
          done
          if [[ -z "$gate_run_id" ]]; then
            echo "Unable to resolve the dispatched exact hosted integration run." >&2
            exit 1
          fi

          gate_url="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${gate_run_id}"
          echo "integration_run_id=${gate_run_id}" >> "$GITHUB_OUTPUT"
          echo "integration_run_url=${gate_url}" >> "$GITHUB_OUTPUT"
          echo "Waiting for exact hosted integration: ${gate_url}"
          gh run watch "$gate_run_id" --repo "$GITHUB_REPOSITORY" --exit-status --interval 15

      - name: Restore exact Persona pair read-only
        id: restore
        if: always() && steps.deploy.outcome == 'success' && env.PANTHEON_DEPLOY_PROFILE == 'persona-interaction-write-proof'
        timeout-minutes: 20
        env:
          PANTHEON_DEPLOY_REF: ${{ steps.sha.outputs.sha }}
          PANTHEON_DEPLOY_BRANCH: ${{ env.TARGET_BRANCH || 'dev' }}
          PANTHEON_DEPLOY_PROFILE: persona-interaction-read-only-restore
          PANTHEON_DEPLOY_PROOF_WINDOW_ACK: "false"
          PANTHEON_DEPLOY_RELEASE_INSTANCE: ${{ github.run_id }}-${{ github.run_attempt }}-restore
          GITHUB_SHA: ${{ steps.sha.outputs.sha }}
          VITE_SUPABASE_URL: ${{ vars.VITE_SUPABASE_URL }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ vars.VITE_SUPABASE_PUBLISHABLE_KEY }}
        run: bash scripts/deploy-dev-vm.sh

      - name: Upload deploy evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pantheon-dev-fe-deploy-evidence
          path: |
            .lovable/audits/current-run/**/*.md
            .lovable/audits/current-run/**/*.json
            .lovable/audits/current-run/**/*.log

      - name: Summarize deployment
        if: always()
        run: |
          {
            echo "## Pantheon Dev FE Deploy"
            echo "- target ref: \`${TARGET_REF}\`"
            echo "- deployed sha: \`${{ steps.sha.outputs.sha }}\`"
            echo "- FE: ${PANTHEON_DEV_FE_HOST}"
            echo "- BFF: ${PANTHEON_BFF_BASE_URL}"
            echo "- BFF commit: \`${{ steps.deploy.outputs.bff_commit || 'unknown' }}\`"
            echo "- BFF commit source: \`${{ steps.deploy.outputs.bff_commit_source || 'unknown' }}\`"
            echo "- deployment profile: \`${PANTHEON_DEPLOY_PROFILE}\`"
            if [ "$PANTHEON_DEPLOY_PROFILE" = "persona-interaction-write-proof" ]; then
              echo "- hosted integration: ${{ steps.proof_gate.outputs.integration_run_url || 'dispatch failed' }}"
              echo "- automatic read-only restore: \`${{ steps.restore.outcome }}\`"
            elif [ "$PANTHEON_DEPLOY_PROFILE" = "persona-interaction-read-only-restore" ]; then
              echo "- Persona proof window restored to exact-pair read-only mode."
            fi
            echo "- evidence: pantheon-dev-fe-deploy-evidence"
          } >> "$GITHUB_STEP_SUMMARY"
