name: Pantheon FE-BFF Integration Gate

on:
  workflow_dispatch:
    inputs:
      fe_base_url:
        description: "Hosted frontend URL"
        required: false
        default: "https://pantheon-dev.lovable.app"
      bff_base_url:
        description: "BFF base URL"
        required: false
        default: "https://pantheon-lupin-dev-bff.34.81.75.241.sslip.io"

jobs:
  integration-gate:
    runs-on: ubuntu-latest
    env:
      PANTHEON_FE_BASE_URL: ${{ inputs.fe_base_url }}
      PANTHEON_BFF_BASE_URL: ${{ inputs.bff_base_url }}
      VITE_BFF_MODE: live
      VITE_BFF_FALLBACK: strict
      PANTHEON_E2E_STRICT: "1"
      PANTHEON_AUDIT_OUT_DIR: .lovable/audits
      PANTHEON_BFF_SMOKE_BEARER_TOKEN: ${{ secrets.PANTHEON_BFF_SMOKE_BEARER_TOKEN }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install
        run: npm ci

      - name: Unit / integration tests
        run: npm run test

      - name: Build
        run: npm run build

      - name: Contract drift
        run: npm run test:contract

      - name: Anonymous BFF route probe
        run: node scripts/probe-bff-routes.mjs --anonymous

      - name: Authenticated BFF smoke
        if: env.PANTHEON_BFF_SMOKE_BEARER_TOKEN != ''
        run: node scripts/probe-bff-authenticated-live.mjs

      - name: Install Playwright
        run: npx playwright install chromium --with-deps

      - name: Hosted browser BFF probe
        run: node scripts/probe-hosted-browser-bff.mjs

      - name: Playwright E2E
        run: npm run e2e

      - name: Upload evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pantheon-integration-evidence
          path: |
            .lovable/audits/*.md
            playwright-report
            test-results
