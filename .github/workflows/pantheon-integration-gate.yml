name: Pantheon FE-BFF Integration Gate
run-name: ${{ inputs.proof_correlation_id && format('PINT proof {0}', inputs.proof_correlation_id) || github.event.pull_request.title || github.event.head_commit.message || github.workflow }}

on:
  pull_request:
  push:
    branches:
      - dev
      - main
      - master
  workflow_dispatch:
    inputs:
      fe_base_url:
        description: "Frontend URL. Defaults to the repo dev server on the runner."
        required: false
        default: "http://127.0.0.1:4173"
      fe_sha:
        description: "Exact deployed execute-plans SHA. Hosted PINT proof requires this explicit 40-character SHA."
        required: false
        default: ""
      proof_correlation_id:
        description: "Exact caller correlation used to bind an automatic proof deploy to this run."
        required: false
        default: ""
      bff_base_url:
        description: "BFF base URL"
        required: false
        default: "https://pantheon-lupin-dev-bff.35.201.239.38.sslip.io"
      bff_sha:
        description: "Pantheon backend/BFF SHA"
        required: false
        default: ""
      pantheon_contract_ref:
        description: "Pantheon ref used for the Agora OpenAPI/schema contract bundle"
        required: false
        default: "dev"
      persona_interaction_write_proof:
        description: "Run the explicitly gated hosted Persona interaction write/readback proof"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
      soft_fail:
        description: "Emergency override to keep release gate in observation mode. Hard-gate is the default since 2026-05-14 (FE-INT-GATE early switch). Set true only if a transient external dependency is blocking valid merges."
        required: false
        default: "false"
        type: choice
        options:
          - "true"
          - "false"
      pint_hosted_probe:
        description: "Opt in to the PINT-010-R2 paper-only hosted proposal and targeted desktop/mobile proof."
        required: false
        default: "false"
        type: choice
        options:
          - "true"
          - "false"

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  integration-gate:
    runs-on: ubuntu-latest
    timeout-minutes: 135
    env:
      PANTHEON_FE_BASE_URL: ${{ inputs.fe_base_url || 'http://127.0.0.1:4173' }}
      PANTHEON_BFF_BASE_URL: ${{ inputs.bff_base_url || 'https://pantheon-lupin-dev-bff.35.201.239.38.sslip.io' }}
      # Spec compatibility aliases. Some autoworker-written specs read
      # FRONTEND_BASE_URL / PLAYWRIGHT_BASE_URL instead of PANTHEON_FE_BASE_URL
      # and fall back to http://127.0.0.1:5173 (Vite dev server) when those
      # are unset. Mirror the canonical value into both aliases so existing
      # specs hit the same direct execute-plans frontend target regardless of
      # which env name they read. Source of truth remains PANTHEON_FE_BASE_URL.
      FRONTEND_BASE_URL: ${{ inputs.fe_base_url || 'http://127.0.0.1:4173' }}
      PLAYWRIGHT_BASE_URL: ${{ inputs.fe_base_url || 'http://127.0.0.1:4173' }}
      PANTHEON_OLD_BFF_URL: ${{ secrets.PANTHEON_OLD_BFF_URL || 'https://pantheon-lupin-dev-bff.34.81.75.241.sslip.io' }}
      PANTHEON_HOSTED_PROBE_PATH: "/management/persona-fleet"
      PANTHEON_HOSTED_REQUIRED_BFF_PATHS: "/bff/me"
      PANTHEON_FRONTEND_SHA: ${{ inputs.fe_sha || github.sha }}
      # Only workflow_dispatch may provide an optional expectation. Push/PR
      # gates must never inherit a stale repository variable: live
      # /bff/version is the exact release identity source of truth.
      PANTHEON_EXPECTED_BFF_SHA: ${{ inputs.bff_sha || '' }}
      PANTHEON_AGORA_CONTRACT_REF: ${{ inputs.pantheon_contract_ref || vars.PANTHEON_AGORA_CONTRACT_REF || 'dev' }}
      PANTHEON_RELEASE_GATE_AUTH_MODE: ${{ vars.PANTHEON_RELEASE_GATE_AUTH_MODE || 'permissive' }}
      PANTHEON_RELEASE_GATE_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
      PANTHEON_RELEASE_GATE_SOFT_FAIL: ${{ inputs.soft_fail || vars.PANTHEON_RELEASE_GATE_SOFT_FAIL || 'false' }}
      PANTHEON_PINT_HOSTED_PROBE: ${{ inputs.pint_hosted_probe || 'false' }}
      PANTHEON_PERSONA_INTERACTION_WRITE_PROOF: ${{ inputs.persona_interaction_write_proof || 'false' }}
      PANTHEON_PROOF_CORRELATION_ID: ${{ inputs.proof_correlation_id || '' }}
      # VITE_BFF_* are build-time vars for the Vite FE bundle. Keep them unset
      # at job level so unit tests can exercise hybrid/auto fallback paths.
      # Browser probes use runtime env/input plumbing and PANTHEON_E2E_STRICT.
      PANTHEON_E2E_STRICT: "1"
      PANTHEON_AUDIT_OUT_DIR: .lovable/audits/current-run
      PANTHEON_BFF_SMOKE_BEARER_TOKEN: ${{ secrets.PANTHEON_BFF_SMOKE_BEARER_TOKEN }}
      PANTHEON_BFF_RBAC_TOKENS_JSON: ${{ secrets.PANTHEON_BFF_RBAC_TOKENS_JSON }}
      PANTHEON_BFF_VIEWER_TOKEN: ${{ secrets.PANTHEON_BFF_VIEWER_TOKEN }}
      PANTHEON_BFF_OPERATOR_TOKEN: ${{ secrets.PANTHEON_BFF_OPERATOR_A_TOKEN }}
      PANTHEON_BFF_APPROVER_TOKEN: ${{ secrets.PANTHEON_BFF_APPROVER_TOKEN }}
      PANTHEON_BFF_RISK_OWNER_TOKEN: ${{ secrets.PANTHEON_BFF_RISK_OWNER_TOKEN }}
      PANTHEON_BFF_ADMIN_TOKEN: ${{ secrets.PANTHEON_BFF_ADMIN_TOKEN }}
      PANTHEON_BFF_OPERATOR_A_TOKEN: ${{ secrets.PANTHEON_BFF_OPERATOR_A_TOKEN }}
      PANTHEON_BFF_OPERATOR_B_TOKEN: ${{ secrets.PANTHEON_BFF_OPERATOR_B_TOKEN }}
      PANTHEON_LIVE_DEEP_SSE_MS: ${{ vars.PANTHEON_LIVE_DEEP_SSE_MS || '65000' }}

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.fe_sha || github.sha }}
          persist-credentials: false

      - name: Validate trusted hosted proof checkout before secrets
        if: env.PANTHEON_PINT_HOSTED_PROBE == 'true' || env.PANTHEON_PERSONA_INTERACTION_WRITE_PROOF == 'true'
        run: |
          set -euo pipefail
          if [[ "$GITHUB_EVENT_NAME" != "workflow_dispatch" || \
                "$PANTHEON_PINT_HOSTED_PROBE" != "true" || \
                "$PANTHEON_PERSONA_INTERACTION_WRITE_PROOF" != "true" ]]; then
            echo "Hosted PINT proof requires one explicit workflow_dispatch with both proof opt-ins." >&2
            exit 2
          fi
          if [[ ! "$PANTHEON_PROOF_CORRELATION_ID" =~ ^[0-9a-f]{8}-[0-9a-f]{4}-4[0-9a-f]{3}-[89ab][0-9a-f]{3}-[0-9a-f]{12}$ ]]; then
            echo "Hosted PINT proof requires a unique RFC 4122 version-4 UUID correlation id." >&2
            exit 2
          fi
          if [[ ! "$PANTHEON_FRONTEND_SHA" =~ ^[0-9a-fA-F]{40}$ || \
                "$(git rev-parse HEAD)" != "$PANTHEON_FRONTEND_SHA" ]]; then
            echo "Hosted PINT proof checkout does not match its exact frontend SHA input." >&2
            exit 2
          fi
          git fetch --no-tags origin +refs/heads/dev:refs/remotes/origin/dev
          if ! git merge-base --is-ancestor "$PANTHEON_FRONTEND_SHA" refs/remotes/origin/dev; then
            echo "Hosted PINT proof frontend SHA is not reachable from trusted dev." >&2
            exit 2
          fi
          if [[ "${PANTHEON_FE_BASE_URL%/}" != "https://pantheon-lupin-dev-fe.35.201.239.38.sslip.io" || \
                "${PANTHEON_BFF_BASE_URL%/}" != "https://pantheon-lupin-dev-bff.35.201.239.38.sslip.io" ]]; then
            echo "Hosted PINT proof is restricted to the canonical Pantheon dev FE/BFF hosts." >&2
            exit 2
          fi

      - name: Checkout Pantheon contract bundle
        uses: actions/checkout@v4
        with:
          repository: ajoe734/pantheon
          ref: ${{ env.PANTHEON_AGORA_CONTRACT_REF }}
          path: pantheon-contract
          token: ${{ secrets.PANTHEON_CONTRACT_READ_TOKEN || github.token }}
          persist-credentials: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Prepare audit directory
        run: |
          rm -rf "$PANTHEON_AUDIT_OUT_DIR"
          mkdir -p "$PANTHEON_AUDIT_OUT_DIR"

      - name: Resolve exact live BFF release identity
        id: release_identity
        run: |
          set -euo pipefail
          version_file="$PANTHEON_AUDIT_OUT_DIR/bff-version.json"
          identity_file="$PANTHEON_AUDIT_OUT_DIR/release-identity.json"
          curl --fail --silent --show-error --location \
            --retry 3 --retry-all-errors --connect-timeout 5 --max-time 20 \
            "${PANTHEON_BFF_BASE_URL%/}/bff/version" > "$version_file"
          bff_sha="$(node scripts/release-identity.mjs create \
            --frontend-sha "$PANTHEON_FRONTEND_SHA" \
            --bff-base-url "$PANTHEON_BFF_BASE_URL" \
            --version-file "$version_file" \
            --expected-bff-sha "$PANTHEON_EXPECTED_BFF_SHA" \
            --gate-run-id "$GITHUB_RUN_ID" \
            --gate-run-url "$PANTHEON_RELEASE_GATE_RUN_URL" \
            --output "$identity_file")"
          echo "PANTHEON_BFF_SHA=${bff_sha}" >> "$GITHUB_ENV"
          echo "PANTHEON_RELEASE_IDENTITY_FILE=${identity_file}" >> "$GITHUB_ENV"
          echo "bff_sha=${bff_sha}" >> "$GITHUB_OUTPUT"
          echo "Exact release identity: FE ${PANTHEON_FRONTEND_SHA}, BFF ${bff_sha}"

      - name: Install
        id: install
        continue-on-error: true
        run: |
          set -o pipefail
          npm ci 2>&1 | tee "$PANTHEON_AUDIT_OUT_DIR/npm-ci.log"

      - name: Lint
        id: lint
        continue-on-error: true
        run: |
          set -o pipefail
          npm run lint 2>&1 | tee "$PANTHEON_AUDIT_OUT_DIR/npm-run-lint.log"

      - name: Unit / integration tests
        id: test
        continue-on-error: true
        run: |
          set -o pipefail
          npm run test 2>&1 | tee "$PANTHEON_AUDIT_OUT_DIR/npm-run-test.log"

      - name: Build
        id: build
        continue-on-error: true
        env:
          VITE_SUPABASE_URL: ${{ vars.VITE_SUPABASE_URL }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ vars.VITE_SUPABASE_PUBLISHABLE_KEY }}
        run: |
          set -o pipefail
          VITE_BFF_DEV_BEARER_TOKEN="" npm run build 2>&1 | tee "$PANTHEON_AUDIT_OUT_DIR/npm-run-build.log"

      - name: Bundle-size budget check
        id: bundle_budget
        continue-on-error: true
        env:
          PANTHEON_BUNDLE_SKIP_BUILD: "1"
          PANTHEON_LOAD_BASELINE_OUT_DIR: ${{ env.PANTHEON_AUDIT_OUT_DIR }}
        run: |
          set -o pipefail
          npm run probe:bundle-budget 2>&1 | tee "$PANTHEON_AUDIT_OUT_DIR/bundle-budget-check.log"

      - name: Contract drift
        id: contract
        continue-on-error: true
        env:
          PANTHEON_CONTRACT_ROOT: pantheon-contract
        run: |
          set -o pipefail
          npm run test:contract 2>&1 | tee "$PANTHEON_AUDIT_OUT_DIR/contract-drift.log"

      - name: Management persona 3000 validation
        id: mgmt_persona_3000
        run: |
          set -o pipefail
          npm run validate:mgmt-persona:3000 2>&1 | tee "$PANTHEON_AUDIT_OUT_DIR/mgmt-persona-3000-validation.log"

      - name: Anonymous BFF route probe
        id: route_probe
        continue-on-error: true
        timeout-minutes: 8
        env:
          PANTHEON_BFF_ROUTE_PROBE_ATTEMPTS: ${{ github.event_name == 'pull_request' && '1' || '3' }}
          PANTHEON_BFF_ROUTE_PROBE_TIMEOUT_MS: ${{ github.event_name == 'pull_request' && '8000' || '25000' }}
        run: |
          set -o pipefail
          node scripts/probe-bff-routes.mjs --anonymous 2>&1 | tee "$PANTHEON_AUDIT_OUT_DIR/bff-route-probe-anonymous.log"

      - name: Authenticated BFF smoke
        id: auth_smoke
        if: env.PANTHEON_BFF_SMOKE_BEARER_TOKEN != ''
        continue-on-error: true
        run: |
          set -o pipefail
          node scripts/probe-bff-authenticated-live.mjs 2>&1 | tee "$PANTHEON_AUDIT_OUT_DIR/bff-authenticated-live-smoke.log"

      - name: Live dry-run write probe
        id: write_probe
        if: env.PANTHEON_BFF_SMOKE_BEARER_TOKEN != ''
        continue-on-error: true
        run: |
          set -o pipefail
          npm run probe:bff:writes 2>&1 | tee "$PANTHEON_AUDIT_OUT_DIR/bff-write-path-probe.log"

      - name: Verify exact hosted deployment before PINT proof
        id: pint_manifest_before
        if: env.PANTHEON_PINT_HOSTED_PROBE == 'true' || env.PANTHEON_PERSONA_INTERACTION_WRITE_PROOF == 'true'
        run: |
          set -euo pipefail
          if [[ "$PANTHEON_PINT_HOSTED_PROBE" != "true" || "$PANTHEON_PERSONA_INTERACTION_WRITE_PROOF" != "true" ]]; then
            echo "Hosted PINT proof requires both explicit workflow opt-ins." >&2
            exit 2
          fi
          if [[ ! "$PANTHEON_PROOF_CORRELATION_ID" =~ ^[0-9a-f]{8}-[0-9a-f]{4}-4[0-9a-f]{3}-[89ab][0-9a-f]{3}-[0-9a-f]{12}$ ]]; then
            echo "Hosted PINT proof requires a unique RFC 4122 version-4 UUID correlation id." >&2
            exit 2
          fi
          if [[ "${PANTHEON_FE_BASE_URL%/}" == "http://127.0.0.1:4173" ]]; then
            echo "Hosted PINT proof cannot use the local preview frontend." >&2
            exit 2
          fi
          manifest_file="$PANTHEON_AUDIT_OUT_DIR/deployment-before-pint.json"
          curl --fail --silent --show-error --location \
            --retry 3 --retry-all-errors --connect-timeout 5 --max-time 20 \
            "${PANTHEON_FE_BASE_URL%/}/deployment.json?gate=${GITHUB_RUN_ID}&phase=before" > "$manifest_file"
          node scripts/hosted-deployment-identity.mjs \
            --manifest-file "$manifest_file" \
            --frontend-sha "$PANTHEON_FRONTEND_SHA" \
            --bff-sha "$PANTHEON_BFF_SHA" \
            --fe-base-url "$PANTHEON_FE_BASE_URL" \
            --bff-base-url "$PANTHEON_BFF_BASE_URL" \
            --deployment-profile persona-interaction-write-proof

      - name: PINT hosted governed-proposal smoke
        id: pint_hosted_governance
        if: env.PANTHEON_PINT_HOSTED_PROBE == 'true'
        env:
          PANTHEON_EXPECTED_BFF_SHA: ${{ env.PANTHEON_BFF_SHA }}
          PANTHEON_PINT_PROBE_ALLOW_WRITES: "true"
        run: |
          set -o pipefail
          node scripts/probe-persona-governed-proposal-live.mjs 2>&1 | tee "$PANTHEON_AUDIT_OUT_DIR/pint-hosted-governed-proposal.log"

      - name: Management live deep validation
        id: mgmt_live_deep
        continue-on-error: true
        run: |
          set -o pipefail
          npm run validate:mgmt-live:deep 2>&1 | tee "$PANTHEON_AUDIT_OUT_DIR/management-live-deep-validation.log"

      - name: Install Playwright
        id: install_playwright
        continue-on-error: true
        run: |
          set -o pipefail
          npx playwright install chromium --with-deps 2>&1 | tee "$PANTHEON_AUDIT_OUT_DIR/playwright-install.log"

      - name: Start frontend under test
        id: pr_preview
        if: env.PANTHEON_FE_BASE_URL == 'http://127.0.0.1:4173'
        continue-on-error: true
        env:
          VITE_SUPABASE_URL: ${{ vars.VITE_SUPABASE_URL }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ vars.VITE_SUPABASE_PUBLISHABLE_KEY }}
        run: |
          set -o pipefail
          VITE_BFF_MODE=live \
          VITE_BFF_BASE_URL="" \
          VITE_BFF_FALLBACK=strict \
          VITE_BFF_DEV_BEARER_TOKEN="" \
          npm run dev -- --host 127.0.0.1 --port 4173 > "$PANTHEON_AUDIT_OUT_DIR/pr-frontend-server.log" 2>&1 &
          echo "$!" > "$PANTHEON_AUDIT_OUT_DIR/pr-frontend-server.pid"
          for i in {1..60}; do
            if curl -fsS "$PANTHEON_FE_BASE_URL/" >/dev/null; then
              echo "frontend under test ready at $PANTHEON_FE_BASE_URL"
              exit 0
            fi
            sleep 1
          done
          cat "$PANTHEON_AUDIT_OUT_DIR/pr-frontend-server.log"
          exit 1

      - name: Frontend browser BFF probe
        id: browser_probe
        continue-on-error: true
        run: |
          set -o pipefail
          BROWSER_BFF_BASE="$PANTHEON_BFF_BASE_URL"
          if [ "$PANTHEON_FE_BASE_URL" = "http://127.0.0.1:4173" ]; then
            BROWSER_BFF_BASE="$PANTHEON_FE_BASE_URL"
          fi
          PANTHEON_BROWSER_BFF_BASE_URL="$BROWSER_BFF_BASE" \
          node scripts/probe-hosted-browser-bff.mjs 2>&1 | tee "$PANTHEON_AUDIT_OUT_DIR/hosted-browser-bff-probe.log"

      - name: Management route-load baseline
        id: route_load
        continue-on-error: true
        env:
          PANTHEON_LOAD_BASELINE_OUT_DIR: ${{ env.PANTHEON_AUDIT_OUT_DIR }}
        run: |
          set -o pipefail
          npm run probe:route-load 2>&1 | tee "$PANTHEON_AUDIT_OUT_DIR/route-load-baseline.log"

      - name: Compose management load gate manifest
        id: mgmt_load_gate
        continue-on-error: true
        env:
          PANTHEON_LOAD_BASELINE_OUT_DIR: ${{ env.PANTHEON_AUDIT_OUT_DIR }}
          PANTHEON_LOAD_GATE_MANIFEST: ${{ env.PANTHEON_AUDIT_OUT_DIR }}/release-load-gate-current.json
        run: |
          set -o pipefail
          echo "PANTHEON_LOAD_GATE_MANIFEST=$PANTHEON_LOAD_GATE_MANIFEST" >> "$GITHUB_ENV"
          node scripts/compose-release-load-gate.mjs 2>&1 | tee "$PANTHEON_AUDIT_OUT_DIR/release-load-gate.log"

      - name: Management hosted production acceptance
        id: mgmt_hosted_accept
        continue-on-error: true
        env:
          PANTHEON_LOAD_BASELINE_OUT_DIR: ${{ env.PANTHEON_AUDIT_OUT_DIR }}
          PANTHEON_ACCEPT_ROUTE_TIMEOUT_MS: "45000"
          PANTHEON_ACCEPT_SETTLE_TIMEOUT_MS: "6000"
        run: |
          set -o pipefail
          npm run accept:mgmt:hosted 2>&1 | tee "$PANTHEON_AUDIT_OUT_DIR/management-hosted-acceptance.log"

      - name: PINT hosted desktop/mobile write proof
        id: pint_hosted_e2e
        if: github.event_name == 'workflow_dispatch' && inputs.persona_interaction_write_proof == 'true'
        env:
          PANTHEON_PERSONA_INTERACTION_WRITE_PROOF: "1"
          PANTHEON_PERSONA_INTERACTION_OPERATOR_TOKEN: ${{ secrets.PANTHEON_BFF_OPERATOR_A_TOKEN }}
          PANTHEON_PERSONA_INTERACTION_VIEWER_TOKEN: ${{ secrets.PANTHEON_BFF_VIEWER_TOKEN }}
        run: |
          set -o pipefail
          node scripts/validate-persona-hosted-proof-env.mjs
          npx playwright test e2e/persona-interaction-cross-repo-hosted.spec.ts --project=chromium --project=mobile-chromium 2>&1 | tee "$PANTHEON_AUDIT_OUT_DIR/pint-hosted-desktop-mobile-e2e.log"

      - name: Playwright E2E
        id: e2e
        continue-on-error: true
        env:
          PANTHEON_PERSONA_INTERACTION_WRITE_PROOF: ${{ github.event_name == 'workflow_dispatch' && inputs.persona_interaction_write_proof == 'true' && '1' || '0' }}
          PANTHEON_PERSONA_INTERACTION_OPERATOR_TOKEN: ${{ github.event_name == 'workflow_dispatch' && inputs.persona_interaction_write_proof == 'true' && secrets.PANTHEON_BFF_OPERATOR_A_TOKEN || '' }}
          PANTHEON_PERSONA_INTERACTION_VIEWER_TOKEN: ${{ secrets.PANTHEON_BFF_VIEWER_TOKEN }}
        run: |
          set -o pipefail
          FE_UNDER_TEST="$PANTHEON_FE_BASE_URL"
          BROWSER_BFF_BASE="$PANTHEON_BFF_BASE_URL"
          if [ "$FE_UNDER_TEST" = "http://127.0.0.1:4173" ]; then
            BROWSER_BFF_BASE="$FE_UNDER_TEST"
          fi
          FRONTEND_BASE_URL="$FE_UNDER_TEST" \
          PLAYWRIGHT_BASE_URL="$FE_UNDER_TEST" \
          PANTHEON_FE_BASE_URL="$FE_UNDER_TEST" \
          PANTHEON_BROWSER_BFF_BASE_URL="$BROWSER_BFF_BASE" \
          PANTHEON_SSE_ORIGIN_URL="$FE_UNDER_TEST" \
          VITE_BFF_FALLBACK=strict \
          BFF_FALLBACK=strict \
          PLAYWRIGHT_JSON_OUTPUT_FILE="$PANTHEON_AUDIT_OUT_DIR/playwright-results.json" \
          npx playwright test --reporter=list,html,json 2>&1 | tee "$PANTHEON_AUDIT_OUT_DIR/playwright-e2e.log"

      - name: Verify exact hosted deployment after all mutating proof steps
        id: pint_manifest_after
        if: always() && (env.PANTHEON_PINT_HOSTED_PROBE == 'true' || env.PANTHEON_PERSONA_INTERACTION_WRITE_PROOF == 'true')
        run: |
          set -euo pipefail
          if [[ "$PANTHEON_PINT_HOSTED_PROBE" != "true" || "$PANTHEON_PERSONA_INTERACTION_WRITE_PROOF" != "true" ]]; then
            echo "Hosted PINT proof requires both explicit workflow opt-ins." >&2
            exit 2
          fi
          manifest_file="$PANTHEON_AUDIT_OUT_DIR/deployment-after-all-proof-steps.json"
          curl --fail --silent --show-error --location \
            --retry 3 --retry-all-errors --connect-timeout 5 --max-time 20 \
            "${PANTHEON_FE_BASE_URL%/}/deployment.json?gate=${GITHUB_RUN_ID}&phase=final" > "$manifest_file"
          node scripts/hosted-deployment-identity.mjs \
            --manifest-file "$manifest_file" \
            --frontend-sha "$PANTHEON_FRONTEND_SHA" \
            --bff-sha "$PANTHEON_BFF_SHA" \
            --fe-base-url "$PANTHEON_FE_BASE_URL" \
            --bff-base-url "$PANTHEON_BFF_BASE_URL" \
            --deployment-profile persona-interaction-write-proof

      - name: Verify live BFF release identity remained stable
        id: release_identity_final
        if: always() && steps.release_identity.outcome == 'success'
        run: |
          set -euo pipefail
          version_file="$PANTHEON_AUDIT_OUT_DIR/bff-version-final.json"
          curl --fail --silent --show-error --location \
            --retry 3 --retry-all-errors --connect-timeout 5 --max-time 20 \
            "${PANTHEON_BFF_BASE_URL%/}/bff/version" > "$version_file"
          node scripts/release-identity.mjs verify-version \
            --identity-file "$PANTHEON_RELEASE_IDENTITY_FILE" \
            --version-file "$version_file" \
            --frontend-sha "$PANTHEON_FRONTEND_SHA" \
            --bff-base-url "$PANTHEON_BFF_BASE_URL" \
            --gate-run-id "$GITHUB_RUN_ID"

      - name: Stop frontend under test
        if: always()
        run: |
          if [ -f "$PANTHEON_AUDIT_OUT_DIR/pr-frontend-server.pid" ]; then
            kill "$(cat "$PANTHEON_AUDIT_OUT_DIR/pr-frontend-server.pid")" 2>/dev/null || true
          fi

      - name: Record gate step outcomes
        if: always()
        run: |
          cat > "$PANTHEON_AUDIT_OUT_DIR/release-gate-step-outcomes.json" <<JSON
          {
            "release_identity": { "outcome": "${{ steps.release_identity.outcome }}", "evidence": "${PANTHEON_AUDIT_OUT_DIR}/release-identity.json" },
            "release_identity_final": { "outcome": "${{ steps.release_identity_final.outcome }}", "evidence": "${PANTHEON_AUDIT_OUT_DIR}/bff-version-final.json" },
            "install": { "outcome": "${{ steps.install.outcome }}", "evidence": "${PANTHEON_AUDIT_OUT_DIR}/npm-ci.log" },
            "lint": { "outcome": "${{ steps.lint.outcome }}", "evidence": "${PANTHEON_AUDIT_OUT_DIR}/npm-run-lint.log" },
            "test": { "outcome": "${{ steps.test.outcome }}", "evidence": "${PANTHEON_AUDIT_OUT_DIR}/npm-run-test.log" },
            "build": { "outcome": "${{ steps.build.outcome }}", "evidence": "${PANTHEON_AUDIT_OUT_DIR}/npm-run-build.log" },
            "bundle_budget": { "outcome": "${{ steps.bundle_budget.outcome }}", "evidence": "${PANTHEON_AUDIT_OUT_DIR}/bundle-budget-check.log" },
            "contract": { "outcome": "${{ steps.contract.outcome }}", "evidence": "${PANTHEON_AUDIT_OUT_DIR}/contract-drift.log" },
            "mgmt_persona_3000": { "outcome": "${{ steps.mgmt_persona_3000.outcome }}", "evidence": "${PANTHEON_AUDIT_OUT_DIR}/mgmt-persona-3000-validation.log" },
            "route_probe": { "outcome": "${{ steps.route_probe.outcome }}", "evidence": "${PANTHEON_AUDIT_OUT_DIR}/bff-route-probe-anonymous.log" },
            "auth_smoke": { "outcome": "${{ steps.auth_smoke.outcome }}", "evidence": "${PANTHEON_AUDIT_OUT_DIR}/bff-authenticated-live-smoke.log" },
            "write_probe": { "outcome": "${{ steps.write_probe.outcome }}", "evidence": "${PANTHEON_AUDIT_OUT_DIR}/bff-write-path-probe.log" },
            "pint_manifest_before": { "outcome": "${{ steps.pint_manifest_before.outcome }}", "evidence": "${PANTHEON_AUDIT_OUT_DIR}/deployment-before-pint.json" },
            "mgmt_live_deep": { "outcome": "${{ steps.mgmt_live_deep.outcome }}", "evidence": "${PANTHEON_AUDIT_OUT_DIR}/management-live-deep-validation.log" },
            "install_playwright": { "outcome": "${{ steps.install_playwright.outcome }}", "evidence": "${PANTHEON_AUDIT_OUT_DIR}/playwright-install.log" },
            "browser_probe": { "outcome": "${{ steps.browser_probe.outcome }}", "evidence": "${PANTHEON_AUDIT_OUT_DIR}/hosted-browser-bff-probe.log" },
