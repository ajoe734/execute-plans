      - name: Start frontend under test
        id: pr_preview
        if: env.PANTHEON_FE_BASE_URL == 'http://127.0.0.1:4173'
        continue-on-error: true
        run: |
          set -o pipefail
          PANTHEON_CANDIDATE_PORT=4173 \
          PANTHEON_CANDIDATE_SERVER_INFO="$PANTHEON_AUDIT_OUT_DIR/pr-frontend-server.json" \
          node scripts/serve-release-candidate.mjs .release-candidate/dist > "$PANTHEON_AUDIT_OUT_DIR/pr-frontend-server.log" 2>&1 &
          echo "$!" > "$PANTHEON_AUDIT_OUT_DIR/pr-frontend-server.pid"
          for i in {1..60}; do
            if curl -fsS "$PANTHEON_FE_BASE_URL/" >/dev/null; then
              echo "frontend under test ready at $PANTHEON_FE_BASE_URL"
              exit 0
            fi
            sleep 1
          done
          cat "$PANTHEON_AUDIT_OUT_DIR/pr-frontend-server.log"
          exit 1

      - name: Release-gate Playwright evidence against exact candidate
        id: fixture_e2e
        if: steps.pr_preview.outcome == 'success'
        continue-on-error: true
        env:
          PANTHEON_FE_BASE_URL: "http://127.0.0.1:4173"
          FRONTEND_BASE_URL: "http://127.0.0.1:4173"
          PLAYWRIGHT_BASE_URL: "http://127.0.0.1:4173"
          PANTHEON_SSE_ORIGIN_URL: "http://127.0.0.1:4173"
          PANTHEON_HOSTED_E2E: ""
          FE_INT_GATE_LIVE_BFF: ""
          F08_CREATE_INTENT_LIVE_BFF: ""
          RUN_LIVE_BFF_CONTRACTS: ""
          VITE_BFF_FALLBACK: strict
          BFF_FALLBACK: strict
          VITE_BFF_DEV_BEARER_TOKEN: ""
        run: |
          set -o pipefail
          PLAYWRIGHT_JSON_OUTPUT_FILE="$PANTHEON_AUDIT_OUT_DIR/playwright-results.json" \
          npx playwright test \
            e2e/01-startup-session.spec.ts \
            e2e/02-control-room.spec.ts \
            e2e/03-execution-loop.spec.ts \
            e2e/04-sentinel-remediation.spec.ts \
            e2e/04b-optimization-loop.spec.ts \
            e2e/05-interventions.spec.ts \
            e2e/06-entity-registry.spec.ts \
            e2e/07-high-risk-confirm.spec.ts \
            e2e/08-create-intent.spec.ts \
            e2e/08-sse-reconnect.spec.ts \
            e2e/09-strict-vs-hybrid.spec.ts \
            e2e/10-rollback-saga.spec.ts \
            e2e/11-handoff-sla.spec.ts \
            e2e/12-approvals.spec.ts \
            e2e/13-agora.spec.ts \
            e2e/16-audit-correlation.spec.ts \
            e2e/17-a11y-v5.spec.ts \
            e2e/18-perf.spec.ts \
            --project=chromium \
            --retries=0 \
            --reporter=list,json \
            2>&1 | tee "$PANTHEON_AUDIT_OUT_DIR/playwright-fixture-e2e.log"

      - name: Frontend browser BFF probe
        id: browser_probe
        continue-on-error: true
        env:
          PANTHEON_CANDIDATE_DIR: .release-candidate/dist
          PANTHEON_EXPECTED_FE_SHA: ${{ env.PANTHEON_FRONTEND_SHA }}
          PANTHEON_PROBE_RELEASE_STRICT: "1"
          PANTHEON_PROBE_JSON_OUT: ${{ env.PANTHEON_AUDIT_OUT_DIR }}/hosted-browser-bff-probe.json
        run: |
          set -o pipefail
          PANTHEON_FE_BASE_URL="https://pantheon-lupin-dev-fe.35.201.239.38.sslip.io" \
          PANTHEON_BROWSER_BFF_BASE_URL="$PANTHEON_BFF_BASE_URL" \
          node scripts/probe-hosted-browser-bff.mjs 2>&1 | tee "$PANTHEON_AUDIT_OUT_DIR/hosted-browser-bff-probe.log"

      - name: Management route-load baseline
        id: route_load
        continue-on-error: true
        env:
          PANTHEON_LOAD_BASELINE_OUT_DIR: ${{ env.PANTHEON_AUDIT_OUT_DIR }}
        run: |
          set -o pipefail
          npm run probe:route-load 2>&1 | tee "$PANTHEON_AUDIT_OUT_DIR/route-load-baseline.log"

      - name: Compose management load gate manifest
        id: mgmt_load_gate
        continue-on-error: true
        env:
          PANTHEON_LOAD_BASELINE_OUT_DIR: ${{ env.PANTHEON_AUDIT_OUT_DIR }}
          PANTHEON_LOAD_GATE_MANIFEST: ${{ env.PANTHEON_AUDIT_OUT_DIR }}/release-load-gate-current.json
        run: |
          set -o pipefail
          echo "PANTHEON_LOAD_GATE_MANIFEST=$PANTHEON_LOAD_GATE_MANIFEST" >> "$GITHUB_ENV"
          node scripts/compose-release-load-gate.mjs 2>&1 | tee "$PANTHEON_AUDIT_OUT_DIR/release-load-gate.log"

      - name: Management hosted production acceptance
        id: mgmt_hosted_accept
        continue-on-error: true
        timeout-minutes: 8
        env:
          PANTHEON_LOAD_BASELINE_OUT_DIR: ${{ env.PANTHEON_AUDIT_OUT_DIR }}
          PANTHEON_ACCEPT_ROUTE_TIMEOUT_MS: "45000"
          PANTHEON_ACCEPT_SETTLE_TIMEOUT_MS: "6000"
        run: |
          set -o pipefail
          npm run accept:mgmt:hosted 2>&1 | tee "$PANTHEON_AUDIT_OUT_DIR/management-hosted-acceptance.log"

      - name: PINT hosted desktop/mobile write proof
        id: pint_hosted_e2e
        if: github.event_name == 'workflow_dispatch' && inputs.persona_interaction_write_proof == 'true'
        env:
          PANTHEON_PERSONA_INTERACTION_WRITE_PROOF: "1"
          PANTHEON_PERSONA_INTERACTION_OPERATOR_TOKEN: ${{ secrets.PANTHEON_BFF_OPERATOR_A_TOKEN }}
          PANTHEON_PERSONA_INTERACTION_VIEWER_TOKEN: ${{ secrets.PANTHEON_BFF_VIEWER_TOKEN }}
        run: |
          set -o pipefail
          node scripts/validate-persona-hosted-proof-env.mjs
          npx playwright test e2e/persona-interaction-cross-repo-hosted.spec.ts --project=chromium --project=mobile-chromium 2>&1 | tee "$PANTHEON_AUDIT_OUT_DIR/pint-hosted-desktop-mobile-e2e.log"

      - name: Playwright E2E
        id: e2e
        continue-on-error: true
        env:
          PANTHEON_PERSONA_INTERACTION_WRITE_PROOF: ${{ github.event_name == 'workflow_dispatch' && inputs.persona_interaction_write_proof == 'true' && '1' || '0' }}
          PANTHEON_PERSONA_INTERACTION_OPERATOR_TOKEN: ${{ github.event_name == 'workflow_dispatch' && inputs.persona_interaction_write_proof == 'true' && secrets.PANTHEON_BFF_OPERATOR_A_TOKEN || '' }}
          PANTHEON_PERSONA_INTERACTION_VIEWER_TOKEN: ${{ secrets.PANTHEON_BFF_VIEWER_TOKEN }}
        run: |
          set -o pipefail
          FE_UNDER_TEST="$PANTHEON_FE_BASE_URL"
          FRONTEND_BASE_URL="$FE_UNDER_TEST" \
          PLAYWRIGHT_BASE_URL="$FE_UNDER_TEST" \
          PANTHEON_FE_BASE_URL="$FE_UNDER_TEST" \
          PANTHEON_BROWSER_BFF_BASE_URL="$PANTHEON_BFF_BASE_URL" \
          PANTHEON_SSE_ORIGIN_URL="$FE_UNDER_TEST" \
          VITE_BFF_FALLBACK=strict \
          BFF_FALLBACK=strict \
          PLAYWRIGHT_JSON_OUTPUT_FILE="$PANTHEON_AUDIT_OUT_DIR/playwright-results.json" \
          npx playwright test --reporter=list,html,json 2>&1 | tee "$PANTHEON_AUDIT_OUT_DIR/playwright-e2e.log"

      - name: Verify exact paired hosted deployment after all PINT proof steps
        id: pint_manifest_after
        if: always() && env.PANTHEON_PERSONA_INTERACTION_WRITE_PROOF == 'true'
        env:
          EXPECTED_SOURCE_GATE_RUN_ID: ${{ inputs.source_gate_run_id }}
          EXPECTED_SOURCE_ARTIFACT_DIGEST: ${{ inputs.source_artifact_digest }}
          EXPECTED_PAIR_ID: ${{ inputs.expected_pair_id }}
          EXPECTED_READ_ONLY_DIGEST: ${{ inputs.expected_read_only_digest }}
          EXPECTED_WRITE_PROOF_DIGEST: ${{ inputs.expected_write_proof_digest }}
        run: |
          set -euo pipefail
          manifest_file="$PANTHEON_AUDIT_OUT_DIR/deployment-after-all-proof-steps.json"
          curl --fail --silent --show-error --location \
            --retry 3 --retry-all-errors --connect-timeout 5 --max-time 20 \
            "${PANTHEON_FE_BASE_URL%/}/deployment.json?proof=${PANTHEON_PROOF_CORRELATION_ID}&phase=after" > "$manifest_file"
          node --input-type=module - "$manifest_file" <<'NODE'
          import fs from "node:fs";
          const manifest = JSON.parse(fs.readFileSync(process.argv[2], "utf8"));
          const digest = (value) => String(value || "").replace(/^sha256:/i, "").toLowerCase();
          const valid =
            manifest.commit === process.env.PANTHEON_FRONTEND_SHA &&
            manifest.bffCommit === process.env.PANTHEON_BFF_SHA &&
            String(manifest.gate?.runId) === process.env.EXPECTED_SOURCE_GATE_RUN_ID &&
            manifest.profile === "write-proof" && manifest.deploymentProfile === "write-proof" &&
            manifest.pairId === process.env.EXPECTED_PAIR_ID &&
            manifest.pair?.pairId === process.env.EXPECTED_PAIR_ID &&
            digest(manifest.artifactDigestSha256) === digest(process.env.EXPECTED_WRITE_PROOF_DIGEST) &&
            digest(manifest.pair?.readOnlyArtifactDigestSha256) === digest(process.env.EXPECTED_READ_ONLY_DIGEST) &&
            digest(manifest.pair?.writeProofArtifactDigestSha256) === digest(process.env.EXPECTED_WRITE_PROOF_DIGEST) &&
            String(manifest.githubArtifactDigest || "").toLowerCase() === String(process.env.EXPECTED_SOURCE_ARTIFACT_DIGEST || "").toLowerCase() &&
            manifest.buildMode?.VITE_BFF_REAL_WRITES === "true" &&
            manifest.buildMode?.VITE_BFF_ALLOW_DEV_STUB_WRITES === "true" &&
            manifest.buildMode?.VITE_BFF_EMBEDDED_BEARER_TOKEN === "false" &&
            manifest.deploymentState === "accepted";
          if (!valid) throw new Error("hosted write-proof pair changed during the correlated proof");
          const correlationFile = `${process.env.PANTHEON_AUDIT_OUT_DIR}/pint-proof-correlation.json`;
          const correlation = JSON.parse(fs.readFileSync(correlationFile, "utf8"));
          if (correlation.correlationId !== process.env.PANTHEON_PROOF_CORRELATION_ID) {
            throw new Error("hosted proof correlation changed before final manifest verification");
          }
          correlation.status = "after-proof-verified";
          fs.writeFileSync(correlationFile, `${JSON.stringify(correlation, null, 2)}\n`, "utf8");
          NODE

      - name: Verify live BFF release identity remained stable
        id: release_identity_final
        if: always() && steps.release_identity.outcome == 'success'
        run: |
          set -euo pipefail
          version_file="$PANTHEON_AUDIT_OUT_DIR/bff-version-final.json"
          curl --fail --silent --show-error --location \
            --retry 3 --retry-all-errors --connect-timeout 5 --max-time 20 \
            "${PANTHEON_BFF_BASE_URL%/}/bff/version" > "$version_file"
          node scripts/release-identity.mjs verify-version \
            --identity-file "$PANTHEON_RELEASE_IDENTITY_FILE" \
            --version-file "$version_file" \
            --frontend-sha "$PANTHEON_FRONTEND_SHA" \
            --bff-base-url "$PANTHEON_BFF_BASE_URL" \
            --gate-run-id "$GITHUB_RUN_ID"

      - name: Stop frontend under test
        if: always()
        run: |
          if [ -f "$PANTHEON_AUDIT_OUT_DIR/pr-frontend-server.pid" ]; then
            kill "$(cat "$PANTHEON_AUDIT_OUT_DIR/pr-frontend-server.pid")" 2>/dev/null || true
          fi

      - name: Final verify immutable candidate
        id: candidate_final
        if: >-
          ${{
            always() &&
            github.event_name == 'push' &&
            github.ref == 'refs/heads/dev' &&
            steps.deploy_controller.outcome == 'success' &&
            steps.candidate.outcome == 'success' &&
            steps.release_identity_final.outcome == 'success' &&
            env.PANTHEON_RELEASE_GATE_SOFT_FAIL != 'true'
          }}
        run: |
          set -euo pipefail
          verified_read_only_digest="$(node scripts/release-candidate.mjs verify-pair \
            --candidate-dir .release-candidate \
            --expected-frontend-sha "$PANTHEON_FRONTEND_SHA" \
            --expected-bff-sha "$PANTHEON_BFF_SHA" \
            --expected-bff-base-url "$PANTHEON_BFF_BASE_URL" \
            --expected-gate-run-id "$GITHUB_RUN_ID" \
            --expected-pair-id "$PANTHEON_CANDIDATE_PAIR_ID" \
            --profile read-only)"
          verified_write_proof_digest="$(node scripts/release-candidate.mjs verify-pair \
            --candidate-dir .release-candidate \
            --expected-frontend-sha "$PANTHEON_FRONTEND_SHA" \
            --expected-bff-sha "$PANTHEON_BFF_SHA" \
            --expected-bff-base-url "$PANTHEON_BFF_BASE_URL" \
            --expected-gate-run-id "$GITHUB_RUN_ID" \
            --expected-pair-id "$PANTHEON_CANDIDATE_PAIR_ID" \
            --profile write-proof)"
          if [[ "$verified_read_only_digest" != "$PANTHEON_EXPECTED_ARTIFACT_DIGEST" || \
                "$verified_write_proof_digest" != "$PANTHEON_EXPECTED_WRITE_PROOF_DIGEST" ]]; then
            echo "Final paired candidate digest mismatch." >&2
            exit 1
          fi
          printf 'pairId=%s\nreadOnlyArtifactDigestSha256=%s\nwriteProofArtifactDigestSha256=%s\n' \
            "$PANTHEON_CANDIDATE_PAIR_ID" \
            "$verified_read_only_digest" \
            "$verified_write_proof_digest" \
            > "$PANTHEON_AUDIT_OUT_DIR/final-candidate-pair.txt"

      - name: Record gate step outcomes
        if: always()
        run: |
          cat > "$PANTHEON_AUDIT_OUT_DIR/release-gate-step-outcomes.json" <<JSON
          {
            "release_identity": { "outcome": "${{ steps.release_identity.outcome }}", "evidence": "${PANTHEON_AUDIT_OUT_DIR}/release-identity.json" },
            "proof_source_pair": { "outcome": "${{ steps.proof_source_pair.outcome }}", "evidence": "${PANTHEON_AUDIT_OUT_DIR}/pint-source-pair.txt" },
            "release_identity_final": { "outcome": "${{ steps.release_identity_final.outcome }}", "evidence": "${PANTHEON_AUDIT_OUT_DIR}/bff-version-final.json" },
            "install": { "outcome": "${{ steps.install.outcome }}", "evidence": "${PANTHEON_AUDIT_OUT_DIR}/npm-ci.log" },
            "lint": { "outcome": "${{ steps.lint.outcome }}", "evidence": "${PANTHEON_AUDIT_OUT_DIR}/npm-run-lint.log" },
            "test": { "outcome": "${{ steps.test.outcome }}", "evidence": "${PANTHEON_AUDIT_OUT_DIR}/npm-run-test.log" },
            "deploy_controller": { "outcome": "${{ steps.deploy_controller.outcome }}", "evidence": "${PANTHEON_AUDIT_OUT_DIR}/deploy-controller-regression.log" },
            "build": { "outcome": "${{ steps.build.outcome }}", "evidence": "${PANTHEON_AUDIT_OUT_DIR}/npm-run-build.log" },
            "build_write_proof": { "outcome": "${{ steps.build_write_proof.outcome }}", "evidence": "${PANTHEON_AUDIT_OUT_DIR}/npm-run-build-write-proof.log" },
            "candidate": { "outcome": "${{ steps.candidate.outcome }}", "evidence": ".release-candidate/candidate.json" },
            "candidate_final": { "outcome": "${{ steps.candidate_final.outcome }}", "evidence": "${PANTHEON_AUDIT_OUT_DIR}/final-candidate-pair.txt" },
            "bundle_budget": { "outcome": "${{ steps.bundle_budget.outcome }}", "evidence": "${PANTHEON_AUDIT_OUT_DIR}/bundle-budget-check.log" },
            "contract": { "outcome": "${{ steps.contract.outcome }}", "evidence": "${PANTHEON_AUDIT_OUT_DIR}/contract-drift.log" },
            "mgmt_persona_3000": { "outcome": "${{ steps.mgmt_persona_3000.outcome }}", "evidence": "${PANTHEON_AUDIT_OUT_DIR}/mgmt-persona-3000-validation.log" },
            "route_probe": { "outcome": "${{ steps.route_probe.outcome }}", "evidence": "${PANTHEON_AUDIT_OUT_DIR}/bff-route-probe-anonymous.log" },
            "auth_smoke": { "outcome": "${{ steps.auth_smoke.outcome }}", "evidence": "${PANTHEON_AUDIT_OUT_DIR}/bff-authenticated-live-smoke.log" },
            "write_probe": { "outcome": "${{ steps.write_probe.outcome }}", "evidence": "${PANTHEON_AUDIT_OUT_DIR}/bff-write-path-probe.log" },
            "pint_manifest_before": { "outcome": "${{ steps.pint_manifest_before.outcome }}", "evidence": "${PANTHEON_AUDIT_OUT_DIR}/deployment-before-pint.json" },
            "mgmt_live_deep": { "outcome": "${{ steps.mgmt_live_deep.outcome }}", "evidence": "${PANTHEON_AUDIT_OUT_DIR}/management-live-deep-validation.log" },
            "install_playwright": { "outcome": "${{ steps.install_playwright.outcome }}", "evidence": "${PANTHEON_AUDIT_OUT_DIR}/playwright-install.log" },
            "fixture_e2e": { "outcome": "${{ steps.fixture_e2e.outcome }}", "evidence": "${PANTHEON_AUDIT_OUT_DIR}/playwright-fixture-e2e.log" },
            "browser_probe": { "outcome": "${{ steps.browser_probe.outcome }}", "evidence": "${PANTHEON_AUDIT_OUT_DIR}/hosted-browser-bff-probe.log" },
            "route_load": { "outcome": "${{ steps.route_load.outcome }}", "evidence": "${PANTHEON_AUDIT_OUT_DIR}/route-load-baseline.log" },
            "mgmt_load_gate": { "outcome": "${{ steps.mgmt_load_gate.outcome }}", "evidence": "${PANTHEON_AUDIT_OUT_DIR}/release-load-gate.log" },
            "mgmt_hosted_accept": { "outcome": "${{ steps.mgmt_hosted_accept.outcome }}", "evidence": "${PANTHEON_AUDIT_OUT_DIR}/management-hosted-acceptance.log" },
            "pint_hosted_e2e": { "outcome": "${{ steps.pint_hosted_e2e.outcome }}", "evidence": "${PANTHEON_AUDIT_OUT_DIR}/pint-hosted-desktop-mobile-e2e.log" },
            "pint_manifest_after": { "outcome": "${{ steps.pint_manifest_after.outcome }}", "evidence": "${PANTHEON_AUDIT_OUT_DIR}/deployment-after-all-proof-steps.json" },
            "pr_preview": { "outcome": "${{ steps.pr_preview.outcome }}", "evidence": "${PANTHEON_AUDIT_OUT_DIR}/pr-frontend-server.log" },
            "e2e": { "outcome": "${{ steps.e2e.outcome }}", "evidence": "${PANTHEON_AUDIT_OUT_DIR}/playwright-e2e.log" }
          }
          JSON

      - name: Aggregate release gate
        id: aggregate
        if: always()
        continue-on-error: ${{ github.event_name == 'workflow_dispatch' && inputs.soft_fail == 'true' }}
        run: node scripts/aggregate-release-gate.mjs

      - name: Upload deployable immutable candidate pair
        id: candidate_upload
        if: >-
          ${{
            github.event_name == 'push' &&
            github.ref == 'refs/heads/dev' &&
            steps.aggregate.outcome == 'success' &&
            steps.deploy_controller.outcome == 'success' &&
            steps.candidate.outcome == 'success' &&
            steps.candidate_final.outcome == 'success' &&
            steps.release_identity_final.outcome == 'success' &&
            env.PANTHEON_RELEASE_GATE_SOFT_FAIL != 'true'
          }}
        uses: actions/upload-artifact@v4
        with:
          name: pantheon-fe-release-candidate-attempt-${{ github.run_attempt }}
          path: .release-candidate
          if-no-files-found: error
          include-hidden-files: true
          retention-days: 14

      - name: Record deployable candidate identity
        if: steps.candidate_upload.outcome == 'success'
        run: |
          {
            echo "## Deployable frontend candidate"
            echo "- frontend SHA: \`${PANTHEON_FRONTEND_SHA}\`"
            echo "- BFF SHA: \`${PANTHEON_BFF_SHA}\`"
            echo "- gate run: \`${GITHUB_RUN_ID}\`"
            echo "- gate attempt: \`${GITHUB_RUN_ATTEMPT}\`"
            echo "- pair id: \`${PANTHEON_CANDIDATE_PAIR_ID}\`"
            echo "- read-only digest: \`${PANTHEON_EXPECTED_ARTIFACT_DIGEST}\`"
            echo "- write-proof digest: \`${PANTHEON_EXPECTED_WRITE_PROOF_DIGEST}\`"
            echo "- artifact: \`pantheon-fe-release-candidate-attempt-${GITHUB_RUN_ATTEMPT}\`"
            echo "- GitHub artifact digest: \`${{ steps.candidate_upload.outputs.artifact-digest }}\`"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Prepare evidence artifact paths
        if: always()
        run: |
          rm -rf pantheon-audits
          mkdir -p pantheon-audits/current-run
          if [ -d "$PANTHEON_AUDIT_OUT_DIR" ]; then
            cp -a "$PANTHEON_AUDIT_OUT_DIR"/. pantheon-audits/current-run/
          fi

      - name: Upload evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pantheon-integration-evidence-attempt-${{ github.run_attempt }}
          include-hidden-files: true
          path: |
            pantheon-audits/current-run
            playwright-report
            test-results

      - name: Upload exact release identity
        if: always() && steps.release_identity.outcome == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: pantheon-release-identity-attempt-${{ github.run_attempt }}
          if-no-files-found: error
          include-hidden-files: true
          path: ${{ env.PANTHEON_AUDIT_OUT_DIR }}/release-identity.json

  pr-comment:
    name: Publish PR-only release gate comment
    needs: integration-gate
    if: always() && github.event_name == 'pull_request'
    timeout-minutes: 10
    permissions:
      contents: read
      actions: read
      issues: write
      pull-requests: write
    runs-on: ubuntu-latest
    steps:
      - name: Download release gate evidence
        id: evidence
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          name: pantheon-integration-evidence-attempt-${{ github.run_attempt }}
          path: pantheon-pr-comment-evidence

      - name: Comment release gate on PR
        uses: actions/github-script@v7
        env:
          SUMMARY_PATH: pantheon-pr-comment-evidence/pantheon-audits/current-run/release-gate-summary.md
        with:
          script: |
            const fs = require('fs');
            const marker = '<!-- pantheon-release-gate-summary -->';
            const summaryPath = process.env.SUMMARY_PATH;
            const fallback = `${marker}\n# Pantheon FE-BFF Release Gate Summary\n\nRelease gate summary was not generated. Check the workflow logs.`;
            const summary = summaryPath && fs.existsSync(summaryPath)
              ? fs.readFileSync(summaryPath, 'utf8')
              : fallback;
            const body = summary.length > 60000
              ? `${summary.slice(0, 59500)}\n\n...truncated; see uploaded pantheon-integration-evidence artifact.`
              : summary;
            const comments = await github.rest.issues.listComments({
              owner: context.repo.owner, repo: context.repo.repo,
              issue_number: context.issue.number, per_page: 100,
            });
            const existing = comments.data.find((comment) =>
              comment.user?.type === 'Bot' && comment.body?.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner, repo: context.repo.repo,
                comment_id: existing.id, body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner, repo: context.repo.repo,
                issue_number: context.issue.number, body,
              });
            }
