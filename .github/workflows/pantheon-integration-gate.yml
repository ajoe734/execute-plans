          JSON

      - name: Aggregate release gate
        id: aggregate
        if: always()
        continue-on-error: ${{ (inputs.soft_fail || vars.PANTHEON_RELEASE_GATE_SOFT_FAIL || 'false') == 'true' }}
        run: node scripts/aggregate-release-gate.mjs

      - name: Prepare evidence artifact paths
        if: always()
        run: |
          rm -rf pantheon-audits
          mkdir -p pantheon-audits/current-run
          if [ -d "$PANTHEON_AUDIT_OUT_DIR" ]; then
            cp -a "$PANTHEON_AUDIT_OUT_DIR"/. pantheon-audits/current-run/
          fi

      - name: Upload evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pantheon-integration-evidence
          include-hidden-files: true
          path: |
            pantheon-audits/current-run
            playwright-report
            test-results

      - name: Upload exact release identity
        if: always() && steps.release_identity.outcome == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: pantheon-release-identity
          if-no-files-found: error
          include-hidden-files: true
          path: ${{ env.PANTHEON_AUDIT_OUT_DIR }}/release-identity.json

      - name: Comment release gate on PR
        if: always() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = require('path');
            const marker = '<!-- pantheon-release-gate-summary -->';
            const summaryPath = path.join(process.env.PANTHEON_AUDIT_OUT_DIR || '.lovable/audits', 'release-gate-summary.md');
            const fallback = `${marker}\n# Pantheon FE-BFF Release Gate Summary\n\nRelease gate summary was not generated. Check the workflow logs.`;
            const summary = fs.existsSync(summaryPath)
              ? fs.readFileSync(summaryPath, 'utf8')
              : fallback;
            const body = summary.length > 60000
              ? `${summary.slice(0, 59500)}\n\n...truncated; see uploaded pantheon-integration-evidence artifact.`
              : summary;
            const comments = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              per_page: 100,
            });
            const existing = comments.data.find(comment =>
              comment.user?.type === 'Bot' && comment.body?.includes(marker)
            );
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
