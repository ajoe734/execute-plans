              schema:
                type: string
        '401':
          description: Authentication required
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  parameters:
    PageSize:
      name: pageSize
      in: query
      schema:
        type: integer
        minimum: 1
        maximum: 200
        default: 50
    Cursor:
      name: cursor
      in: query
      schema:
        type: string
    Sort:
      name: sort
      in: query
      schema:
        type: string
      description: 'Comma multi-sort. Example: -updatedAt,name. Nulls last by default.'
    IdempotencyKey:
      name: Idempotency-Key
      in: header
      required: true
      schema:
        type: string
      description: Required for every write/action endpoint. Never place in request body.
    CorrelationId:
      name: X-Correlation-Id
      in: header
      schema:
        type: string
    TenantId:
      name: X-Tenant-Id
      in: header
      schema:
        type: string
    BffApiVersion:
      name: X-BFF-Api-Version
      in: header
      schema:
        type: string
        default: '2026-05-07'
    LastEventId:
      name: Last-Event-Id
      in: header
      schema:
        type: string
  schemas:
    RiskLevel:
      type: string
      enum:
      - info
      - low
